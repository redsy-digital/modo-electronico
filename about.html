<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre - Modo Electrónico</title>

  <!-- CSS (agora sem ../) -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="assets/images/favicon.png">
</head>
<body>

<header class="header">
  <div class="container nav-container">
    <div class="logo-area">
      <img src="assets/images/logo.png" alt="Logo">
      <div class="logo-text">Modo <span>Electrónico</span></div>
    </div>
  </div>
</header>

<section class="section">
  <div class="container" style="max-width:800px;">

    <h2 class="section-title">Sobre Nós</h2>

    <!-- CONTACTO -->
    <div class="info-card">
      <h3>📞 Contacto</h3>
      <p id="aboutPhone">Telefone: Não definido</p>
      <p id="aboutEmail">Email: Não definido</p>
    </div>

    <!-- LOCALIZAÇÃO -->
    <div class="info-card">
      <h3>📍 Localização</h3>
      <p id="aboutAddress">Endereço: Não definido</p>
      <p id="aboutCity">Cidade: Não definida</p>
    </div>

    <!-- HORÁRIO -->
    <div class="info-card">
      <h3>🕒 Horário</h3>
      <p id="aboutSchedule">Horário não definido</p>
    </div>

    <!-- REDES SOCIAIS -->
    <div class="info-card">
      <h3>🌐 Redes Sociais</h3>
      <ul id="aboutSocialList" class="social-list"></ul>
    </div>

  </div>
</section>

<!-- JS (agora sem ../) -->
<script src="assets/js/about.js" defer></script>

</body>
</html>
