<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Modo Electrónico</title>

<link rel="icon" href="/assets/images/favicon.png">

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="admin-layout">

<!-- SIDEBAR -->
<aside class="admin-sidebar" id="adminSidebar">

<div class="sidebar-top">

<div class="logo-area">
<img src="/assets/images/logo.png" alt="logo">
<div class="logo-text">Modo <span>Electrónico</span></div>
</div>

</div>

<nav class="sidebar-menu">

<a href="/admin/dashboard.html" class="active">
<i class="fa-solid fa-chart-line"></i>
<span>Dashboard</span>
</a>

<a href="/admin/products.html">
<i class="fa-solid fa-box"></i>
<span>Produtos</span>
</a>

<a href="/admin/categories.html">
<i class="fa-solid fa-tags"></i>
<span>Categorias</span>
</a>

<a href="/admin/add-product.html">
<i class="fa-solid fa-plus"></i>
<span>Adicionar Produto</span>
</a>

<a href="/admin/settings.html">
<i class="fa-solid fa-gear"></i>
<span>Definições</span>
</a>

<a href="/admin/credentials.html">
<i class="fa-solid fa-user-shield"></i>
<span>Credenciais</span>
</a>

</nav>

<div class="sidebar-footer">

<button id="logoutBtn" class="btn btn-outline logout-btn">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</button>

</div>

</aside>


<div class="overlay" id="overlay"></div>

<!-- MAIN -->
<main class="admin-main">

<header class="admin-header">

<button class="menu-toggle" id="menuToggle">
<i class="fa-solid fa-bars"></i>
</button>

<div class="mobile-logo">
<img src="/assets/images/logo.png" alt="logo">
<span>Modo <strong>Electrónico</strong></span>
</div>

<div class="header-title">
<h1>Dashboard</h1>
<p>Visão geral do sistema</p>
</div>

</header>

<section class="stats-grid">

<div class="stat-card">
<i class="fa-solid fa-box"></i>
<div>
<h3 id="totalProducts">—</h3>
<span>Total de Produtos</span>
</div>
</div>

<div class="stat-card">
<i class="fa-solid fa-check-circle"></i>
<div>
<h3 id="activeProducts">—</h3>
<span>Produtos Ativos</span>
</div>
</div>

<div class="stat-card">
<i class="fa-solid fa-star"></i>
<div>
<h3 id="featuredProducts">—</h3>
<span>Produtos em Destaque</span>
</div>
</div>

<div class="stat-card">
<i class="fa-solid fa-tags"></i>
<div>
<h3 id="totalCategories">—</h3>
<span>Total de Categorias</span>
</div>
</div>

</section>

</main>

</div>

<script src="/admin/adminAuth.js"></script>
<script src="/admin/dashboard.js"></script>

</body>
</html>
