<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Categorias | Modo Electrónico</title>

<link rel="icon" href="/assets/images/favicon.png">

<link rel="stylesheet" href="../assets/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="admin-layout">

<!-- SIDEBAR -->
<aside class="admin-sidebar" id="adminSidebar">

<div class="sidebar-top">

<div class="logo-area">
<img src="/assets/images/logo.png">
<div class="logo-text">Modo <span>Electrónico</span></div>
</div>

</div>

<nav class="sidebar-menu">

<a href="/admin/dashboard.html">
<i class="fa-solid fa-chart-line"></i>
<span>Dashboard</span>
</a>

<a href="/admin/products.html">
<i class="fa-solid fa-box"></i>
<span>Produtos</span>
</a>

<a href="/admin/categories.html" class="active">
<i class="fa-solid fa-tags"></i>
<span>Categorias</span>
</a>

<a href="/admin/add-product.html">
<i class="fa-solid fa-plus"></i>
<span>Adicionar Produto</span>
</a>

<a href="/admin/settings.html">
<i class="fa-solid fa-gear"></i>
<span>Definições</span>
</a>

<a href="/admin/credentials.html">
<i class="fa-solid fa-user-shield"></i>
<span>Credenciais</span>
</a>

</nav>

<div class="sidebar-footer">

<button id="logoutBtn" class="btn btn-outline logout-btn">
<i class="fa-solid fa-right-from-bracket"></i>
Terminar Sessão
</button>

</div>

</aside>

<div class="overlay" id="overlay"></div>

<!-- MAIN -->
<main class="admin-main">

<!-- MOBILE HEADER -->

<header class="header admin-mobile-header">

<div class="container nav-container">

<div class="logo-area">
<img src="/assets/images/logo.png">
<div class="logo-text">Modo <span>Electrónico</span></div>
</div>

<div class="menu-toggle" id="menuToggle">☰</div>

</div>

</header>

<!-- PAGE HEADER -->

<div class="admin-header">

<div>
<h1>Categorias</h1>
<p>Gerir categorias da loja</p>
</div>

</div>

<!-- FORM CARD -->

<div class="stat-card" style="max-width:500px;">

<div style="width:100%;">

<h3 style="margin-bottom:15px;">Nova Categoria</h3>

<input
type="text"
id="categoryName"
placeholder="Nome da categoria"
class="input"
style="width:100%; margin-bottom:15px;"
>

<button onclick="createCategory()" class="btn btn-primary">
Criar Categoria
</button>

</div>

</div>

<!-- TABLE -->

<div class="table-container">

<table class="admin-table">

<thead>
<tr>
<th>Nome</th>
<th>Slug</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="categoriesList"></tbody>

</table>

</div>

</main>

<footer>
  <p>© 2026 Modo Electrónico. Todos os direitos reservados.</p>
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="/assets/js/supabase.js"></script>
<script src="/assets/js/adminAuth.js"></script>
<script src="/assets/js/dashboard.js"></script>
<script src="/assets/js/categories.js"></script>

<!-- LOGOUT MODAL -->

<div class="logout-modal hidden" id="logoutModal">

<div class="logout-modal-card">

<h3>Deseja sair do painel?</h3>
<p>A sua sessão será encerrada.</p>

<div class="logout-actions">

<button id="cancelLogout" class="btn btn-outline">
Cancelar
</button>

<button id="confirmLogout" class="btn btn-primary">
Sim, sair
</button>

</div>

</div>

</div>

</body>
