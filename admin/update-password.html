<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Palavra-passe - Modo Electrónico</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" href="../assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===========================
       UPDATE PASSWORD PAGE
       =========================== */
    
    .password-reset-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(circle at 20% 30%, rgba(0,207,255,0.1), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(0,102,255,0.1), transparent 40%),
                  var(--bg);
    }

    .password-reset-container {
      width: 100%;
      max-width: 450px;
    }

    .password-reset-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .password-reset-header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: var(--text);
    }

    .password-reset-header p {
      color: var(--text2);
      font-size: 14px;
    }

    .password-reset-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: var(--card);
      padding: 35px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 0 20px rgba(0,207,255,0.1);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(0, 255, 200, 0.2);
      background: rgba(20, 25, 40, 0.6);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      transition: 0.3s ease;
      outline: none;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 207, 255, 0.2),
                  0 0 15px rgba(0, 207, 255, 0.3);
      background: rgba(20, 25, 40, 0.8);
      transform: scale(1.02);
    }

    .password-requirements {
      background: rgba(0, 207, 255, 0.05);
      border: 1px solid rgba(0, 207, 255, 0.1);
      border-radius: 10px;
      padding: 14px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }

    .requirement {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .requirement:last-child {
      margin-bottom: 0;
    }

    .requirement-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      background: rgba(0, 207, 255, 0.2);
      color: var(--accent);
      flex-shrink: 0;
    }

    .requirement.met .requirement-icon {
      background: rgba(76, 175, 80, 0.2);
      color: #4CAF50;
    }

    .requirement.met {
      color: #4CAF50;
    }

    .password-strength {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      background: rgba(0, 207, 255, 0.1);
      border-radius: 2px;
      transition: 0.3s ease;
    }

    .strength-bar.active {
      background: var(--accent);
    }

    .strength-text {
      font-size: 11px;
      color: var(--text2);
      margin-top: 6px;
      text-align: right;
    }

    .error-message {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.3);
      color: #FF4D4D;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      margin-bottom: 10px;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #4CAF50;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      margin-bottom: 10px;
    }

    .success-message.show {
      display: block;
    }

    .submit-btn {
      padding: 14px 28px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: var(--glow);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      transition: 0.3s;
    }

    .back-link a:hover {
      color: var(--text);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .password-reset-section {
        padding: 15px;
      }

      .password-reset-form {
        padding: 25px;
      }

      .password-reset-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container nav-container">
      <div class="logo-area">
        <img src="../assets/images/logo.png" alt="Logo">
        <div class="logo-text">Modo <span>Electrónico</span></div>
      </div>
    </div>
  </header>

  <section class="password-reset-section">
    <div class="password-reset-container">
      <div class="password-reset-header">
        <h1>Redefinir Palavra-passe</h1>
        <p>Defina uma nova palavra-passe segura para a sua conta</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="passwordResetForm" class="password-reset-form">
        <div class="form-group">
          <label for="newPassword">Nova Palavra-passe</label>
          <input 
            type="password" 
            id="newPassword" 
            placeholder="Introduza a nova palavra-passe" 
            required
            minlength="6"
          >
          <div class="password-strength">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Palavra-passe</label>
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Confirme a palavra-passe" 
            required
            minlength="6"
          >
        </div>

        <div class="password-requirements">
          <div class="requirement" id="req-length">
            <div class="requirement-icon">✓</div>
            <span>Mínimo 6 caracteres</span>
          </div>
          <div class="requirement" id="req-match">
            <div class="requirement-icon">✓</div>
            <span>As palavras-passe coincidem</span>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Atualizar Palavra-passe
        </button>
      </form>

      <div class="back-link">
        <a href="login.html">Voltar ao Login</a>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/password-recovery.js"></script>
  <script src="../assets/js/adminAuth.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const form = document.getElementById("passwordResetForm");
      const newPasswordInput = document.getElementById("newPassword");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const submitBtn = document.getElementById("submitBtn");
      const errorMessage = document.getElementById("errorMessage");
      const successMessage = document.getElementById("successMessage");
      const strengthBars = document.querySelectorAll(".strength-bar");
      const strengthText = document.getElementById("strengthText");
      const reqLength = document.getElementById("req-length");
      const reqMatch = document.getElementById("req-match");

      // ========================================
      // PASSWORD STRENGTH CALCULATOR
      // ========================================
      function calculateStrength(password) {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (password.length >= 14) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;
        return Math.min(Math.floor(strength / 2), 3);
      }

      // ========================================
      // UPDATE STRENGTH INDICATOR
      // ========================================
      function updateStrengthIndicator() {
        const password = newPasswordInput.value;
        const strength = calculateStrength(password);

        strengthBars.forEach((bar, index) => {
          bar.classList.toggle("active", index < strength);
        });

        const strengthLabels = ["Fraca", "Média", "Forte"];
        const strengthColors = ["#FF4D4D", "#FFA500", "#4CAF50"];
        
        if (password.length === 0) {
          strengthText.textContent = "";
        } else {
          strengthText.textContent = `Força: ${strengthLabels[strength - 1] || "Muito fraca"}`;
          strengthText.style.color = strengthColors[strength - 1] || "#FF4D4D";
        }
      }

      // ========================================
      // UPDATE REQUIREMENTS
      // ========================================
      function updateRequirements() {
        const password = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Length requirement
        if (password.length >= 6) {
          reqLength.classList.add("met");
        } else {
          reqLength.classList.remove("met");
        }

        // Match requirement
        if (password && confirmPassword && password === confirmPassword) {
          reqMatch.classList.add("met");
        } else {
          reqMatch.classList.remove("met");
        }

        // Enable/disable submit button
        const isValid = password.length >= 6 && password === confirmPassword;
        submitBtn.disabled = !isValid;
      }

      // ========================================
      // EVENT LISTENERS
      // ========================================
      newPasswordInput.addEventListener("input", () => {
        updateStrengthIndicator();
        updateRequirements();
      });

      confirmPasswordInput.addEventListener("input", updateRequirements);

      // ========================================
      // FORM SUBMISSION
      // ========================================
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Clear messages
        errorMessage.classList.remove("show");
        successMessage.classList.remove("show");

        // Validation
        if (newPassword.length < 6) {
          showError("A palavra-passe deve ter pelo menos 6 caracteres.");
          return;
        }

        if (newPassword !== confirmPassword) {
          showError("As palavras-passe não coincidem.");
          return;
        }

        // Update button state
        submitBtn.disabled = true;
        const originalText = submitBtn.textContent;
        submitBtn.innerHTML = '<span class="loading-spinner"></span>Atualizando...';

        try {
          // Check if user has a recovery session
          const { data: { session } } = await supabaseClient.auth.getSession();
          
          if (!session) {
            showError("Sessão expirada. Por favor, solicite um novo link de recuperação.");
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
          }

          // Update password
          const { error } = await supabaseClient.auth.updateUser({
            password: newPassword
          });

          if (error) {
            showError("Erro ao atualizar a palavra-passe: " + error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
          }

          // Success
          showSuccess("Palavra-passe atualizada com sucesso!");
          form.reset();
          updateRequirements();
          updateStrengthIndicator();

          // Redirect after 2 seconds
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);

        } catch (err) {
          console.error(err);
          showError("Erro inesperado: " + err.message);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });

      // ========================================
      // HELPER FUNCTIONS
      // ========================================
      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.add("show");
        successMessage.classList.remove("show");
      }

      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.classList.add("show");
        errorMessage.classList.remove("show");
      }

      // Initialize
      updateRequirements();
    });
  </script>
</body>
</html>
